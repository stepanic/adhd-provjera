<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- DOMOVINA.ai-style trikolor "A" monogram -->
  <rect width="512" height="512" rx="96" fill="#FFFFFF"/>

  <!-- Crveni gornji pas -->
  <rect x="0" y="0" width="512" height="170" fill="#E61D2F"/>
  <!-- Navy donji pas -->
  <rect x="0" y="342" width="512" height="170" fill="#002F6C"/>

  <!-- Slovo "A" preko trikolornih pasova; bijeli "knockout" kroz crveni i navy pas -->
  <g>
    <!-- Veliko slovo A — bijeli outline preko crvene i navy zone -->
    <path d="M 256 88 L 156 424 L 220 424 L 240 360 L 272 360 L 292 424 L 356 424 L 256 88 Z M 252 304 L 260 304 L 256 280 Z"
          fill="#FFFFFF"/>
    <!-- Plavi obris slova A u srednjoj (bijeloj) zoni za kontrast -->
    <path d="M 256 88 L 156 424 L 220 424 L 240 360 L 272 360 L 292 424 L 356 424 L 256 88 Z"
          fill="none" stroke="#002F6C" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- AI graph node — mali graph na sredini A-jeve "popunjave" -->
  <g transform="translate(232, 232)" fill="#002F6C" stroke="#002F6C" stroke-width="3">
    <line x1="0" y1="0" x2="32" y2="-16" />
    <line x1="0" y1="0" x2="36" y2="20" />
    <line x1="0" y1="0" x2="-28" y2="22" />
    <line x1="32" y1="-16" x2="36" y2="20" />
    <line x1="36" y1="20" x2="-28" y2="22" />
    <circle cx="0" cy="0" r="6"/>
    <circle cx="32" cy="-16" r="5"/>
    <circle cx="36" cy="20" r="5"/>
    <circle cx="-28" cy="22" r="5"/>
  </g>
</svg>
